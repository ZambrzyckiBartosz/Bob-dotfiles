monitor = , preferred, auto, 1

$mod = SUPER

exec-once = swww-daemon
exec-once = wal -R -n
exec-once = ~/.local/bin/start-quickshell.sh
exec-once = ~/.config/waybar/launch.sh
exec-once = swaync
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mpd-mpris
exec-once = kdeconnect-indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = gnome-keyring-daemon --start --components=secrets
env = MOZ_ENABLE_WAYLAND,1
general {
    gaps_in = 4
    gaps_out = 5
    border_size = 1
    col.active_border = rgb(585b70)
    col.inactive_border = rgb(2a2b36)
    layout = dwindle
    }

decoration {
    rounding = 16
    
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    dim_inactive = true
    dim_strength = 0.04
    
    shadow {
        enabled = true
        range = 35
        render_power = 4
        color = rgba(00000050)
        offset = 0 8
    }
    
    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.006
        brightness = 1.03
        contrast = 1.02
        vibrancy = 0.25
        vibrancy_darkness = 0.6
        new_optimizations = true
        xray = false
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    animation = workspaces, 1, 4.5, buttery, slidefade 10%    
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    animation = border, 1, 7, smooth
    animation = borderangle, 1, 35, linear, loop

    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

input {
    kb_layout = pl
    follow_mouse = 1
    kb_options = caps:escape
    touchpad {
        natural_scroll = true
        drag_lock = true
    }
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 3
}

gestures {
    workspace_swipe_distance = 200
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_create_new = true
}

gesture = 3, horizontal, workspace

bind = $mod, Return, exec, kitty
bind = $mod SHIFT, RETURN, exec, [float; size 700 400] kitty
bind = $mod, A, exec, qs ipc call launcher toggle
bind = $mod, E, exec, thunar
bind = $mod, Q, killactive
bind = $mod SHIFT, U, exec, kitty -e asciiquarium
bind = $mod SHIFT, space, togglefloating
bind = $mod, W, exec, qs ipc call wallpaper toggle
bind = $mod SHIFT, W, exec, ~/.config/scripts/random-wallpaper.sh
bind = $mod, X, exec, hyprlock
bind = $mod, D, exec, qs ipc call dashboard toggle
bind = $mod, M, exec, qs ipc call music toggle
bind = $mod, F, fullscreen
bind = $mod SHIFT Tab, BackSpace, exec, systemctl poweroff
bind = $mod, B, exec, firefox
bind = $mod, T, exec, kitty -e  btop
bind = $mod SHIFT, G, exec, kitty --class grindstone -e /home/bob/GrindStone/grindstone.sh
bind = $mod, G, exec, kitty -e /home/bob/.config/scripts/GifScript.sh
bind = $mod SHIFT, F, exec, killall -SIGUSR1 waybar
bind = $mod SHIFT, M, exec, [fullscreen] kitty -e bash -c "cat ~/.cache/wal/sequences; cmatrix -s -a -b"
bind = SUPER, V, exec, ~/.config/scripts/cliphist.sh | wl-copy
bind = $mod SHIFT, N,exec,  kitty zsh -ic nvim
bind = $mod, SPACE, togglefloating
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, I, movewindow, u
bind = $mod SHIFT, L, movewindow, r

binde = $mod CTRL, Left, resizeactive, -20 0
binde = $mod CTRL, Right, resizeactive, 20 0
binde = $mod CTRL, Up, resizeactive, 0 -20
binde = $mod CTRL, Down, resizeactive, 0 20

bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

bind = $mod, S, togglespecialworkspace
bind = $mod SHIFT, S, movetoworkspace, special

bind = $mod, P, pseudo
bind = $mod, J, togglesplit

bind = SUPER, N, exec, swaync-client -t -sw
bind = SUPER SHIFT, N, exec, swaync-client -C

bind = $mod, Print, exec, grim ~/screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Screenshot saved"

bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy && ~/screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Mini screenshot taken"

bind = , Menu, exec, ~/.config/scripts/define.sh

bind = $mod, P, exec, gpu-screen-recorder -w screen -f 30 -a default_output -o ~/screen-recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4 & notify-send "Recording Started"

bind = $mod SHIFT, P, exec, killall -SIGINT gpu-screen-recorder && notify-send "Recording Stopped"


bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

binde = , F1, exec, amixer set Master toggle
binde = , F2, exec, amixer set Master 1%-
binde = , F3, exec, amixer set Master 1%+
binde = , XF86AudioMute, exec, amixer set Master toggle
binde = , XF86AudioLowerVolume, exec, amixer set Master 1%-
binde = , XF86AudioRaiseVolume, exec, amixer set Master 1%+
binde = , XF86MonBrightnessUp, exec, brightnessctl s 1%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 1%-

windowrule = match:class Lorien, opacity 0.8 1
windowrule = match:class sublime_text, opacity 0.88 1
windowrule = match:class thunar, opacity 0.9 1
windowrule = match:class Thunar, opacity 0.9 1
windowrule = match:class VSCodium, opacity 0.88 1
windowrule = match:class codium, opacity 0.88 1
windowrule = match:class org.pwmt.zathura, opacity 0.9 1
windowrule = match:class firefox, opacity 1.0 1.0
windowrule = match:class vesktop, opacity 0.96 0.8
windowrule = match:class Code, opacity 1 0.8
windowrule = match:class jetbrains-.*, opacity 1.0 0.9

windowrule = match:class mpv, float on
windowrule = match:class mpv, size 640 360
windowrule = match:class mpv, center on
windowrule = match:class mpv, opacity 1.0 1.0

windowrule = match:float yes, center on

windowrule = match:class kitty, opacity 1.0 0.4
windowrule = match:class thunar, opacity 0.9 0.75

windowrule = match:class scratchterm, float on
windowrule = match:class scratchterm, size 85% 70%
windowrule = match:class scratchterm, center on

layerrule = blur on, match:namespace vesktop

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0s, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window

layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell

layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.1, match:namespace wofi
